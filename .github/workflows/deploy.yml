name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            git fetch --all
            git reset --hard origin/main
            INSTALL_STATIC=true \
              BASE_URL=${{ secrets.DEPLOY_BASE_URL }} \
              BUILD_COMMIT=${{ github.sha }} \
              BUILD_VERSION=$(node -p "require('./package.json').version") \
              NODE_ENV=production \
              bash scripts/deploy.sh

  notify-telegram:
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: Send deploy notification to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          REPOSITORY: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Telegram secrets not configured. Skipping."
            exit 0
          fi

          if [ "$DEPLOY_RESULT" = "success" ]; then
            STATUS_ICON="✅"
          else
            STATUS_ICON="🚨"
          fi

          MESSAGE="${STATUS_ICON} ARIS deploy ${DEPLOY_RESULT}%0ARepository: ${REPOSITORY}%0AActor: ${ACTOR}%0ACommit: ${COMMIT_SHA}%0ARun: ${RUN_URL}"

          curl --fail --silent --show-error \
            --request POST \
            --url "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data chat_id="${TELEGRAM_CHAT_ID}" \
            --data text="${MESSAGE}"
