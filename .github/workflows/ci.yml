name: CI

on:
  push:
    branches:
      - dev
      - main
      - master
      - "ARIS-*"
  pull_request:
    branches:
      - dev
      - main
      - master

jobs:
  frontend-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run frontend checks
        run: npm run ci

  notify-telegram:
    runs-on: ubuntu-latest
    needs: frontend-checks
    if: >
      always() &&
      github.event_name == 'push' &&
      needs.frontend-checks.result != 'success'

    steps:
      - name: Send CI failure alert to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CI_RESULT: ${{ needs.frontend-checks.result }}
          REPOSITORY: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Telegram secrets are not configured. Skipping notification."
            exit 0
          fi

          MESSAGE="ARIS frontend CI alert%0A%0AStatus: ${CI_RESULT}%0ARepository: ${REPOSITORY}%0ABranch: ${BRANCH}%0AActor: ${ACTOR}%0ACommit: ${COMMIT_SHA}%0ARun: ${RUN_URL}"

          curl --fail --silent --show-error \
            --request POST \
            --url "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data chat_id="${TELEGRAM_CHAT_ID}" \
            --data text="${MESSAGE}"
