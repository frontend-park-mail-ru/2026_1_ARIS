name: CI

on:
  push:
    branches:
      - dev
      - main
      - master
      - "ARIS-*"
  pull_request:
    branches:
      - dev
      - main
      - master

jobs:
  frontend-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run frontend checks
        run: npm run ci
