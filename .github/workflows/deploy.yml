name: Deploy Production

on:
  push:
    branches:
      - main

jobs:
  quality-gate:
    uses: ./.github/workflows/frontend-quality-gate.yml
    with:
      artifact_prefix: production

  deploy:
    runs-on: ubuntu-latest
    needs: quality-gate
    environment: production

    steps:
      - name: Deploy frontend via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail

            cd ${{ secrets.DEPLOY_PATH }}
            git fetch origin
            git reset --hard origin/main

            NODE_ENV=development npm ci

            BUILD_COMMIT=${{ github.sha }}
            BUILD_VERSION=$(node -p "require('./package.json').version")
            BUILD_COMMIT="$BUILD_COMMIT" \
              BUILD_VERSION="$BUILD_VERSION" \
              NODE_ENV=production \
              npm run build

            printf 'BUILD_COMMIT=%s\nBUILD_VERSION=%s\n' "$BUILD_COMMIT" "$BUILD_VERSION" > .env.build
            sudo systemctl restart arisfront

            sleep 5
            curl --fail --silent --show-error --max-time 10 ${{ secrets.DEPLOY_BASE_URL }}/ >/dev/null

  notify-telegram:
    runs-on: ubuntu-latest
    needs:
      - quality-gate
      - deploy
    if: always()

    steps:
      - name: Send deploy notification to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          QUALITY_RESULT: ${{ needs.quality-gate.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          REPOSITORY: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Telegram secrets not configured. Skipping."
            exit 0
          fi

          if [ "$QUALITY_RESULT" = "success" ] && [ "$DEPLOY_RESULT" = "success" ]; then
            STATUS_ICON="✅"
          else
            STATUS_ICON="🚨"
          fi

          MESSAGE="${STATUS_ICON} ARIS production push%0AQuality gate: ${QUALITY_RESULT}%0ADeploy: ${DEPLOY_RESULT}%0ARepository: ${REPOSITORY}%0ABranch: ${BRANCH}%0AActor: ${ACTOR}%0ACommit: ${COMMIT_SHA}%0ARun: ${RUN_URL}"

          curl --fail --silent --show-error \
            --request POST \
            --url "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data chat_id="${TELEGRAM_CHAT_ID}" \
            --data text="${MESSAGE}"
