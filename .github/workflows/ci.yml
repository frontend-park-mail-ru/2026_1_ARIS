name: CI

on:
  push:
    branches:
      - dev
      - main
      - master
      - staging
      - "ARIS-*"
  pull_request:
    branches:
      - dev
      - main
      - master

jobs:
  frontend-checks:
    uses: ./.github/workflows/frontend-quality-gate.yml
    with:
      artifact_prefix: ci

  notify-telegram:
    runs-on: ubuntu-latest
    needs: frontend-checks
    if: >
      always() &&
      github.event_name == 'push' &&
      (
        needs.frontend-checks.result != 'success' ||
        github.ref_name == 'dev' ||
        github.ref_name == 'staging' ||
        github.ref_name == 'main' ||
        github.ref_name == 'master'
      )

    steps:
      - name: Send CI notification to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CI_RESULT: ${{ needs.frontend-checks.result }}
          REPOSITORY: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Telegram secrets are not configured. Skipping notification."
            exit 0
          fi

          if [ "$CI_RESULT" = "success" ]; then
            STATUS_ICON="✅"
          else
            STATUS_ICON="🚨"
          fi

          MESSAGE="${STATUS_ICON} ARIS frontend CI ${CI_RESULT}%0ARepository: ${REPOSITORY}%0ABranch: ${BRANCH}%0AActor: ${ACTOR}%0ACommit: ${COMMIT_SHA}%0ARun: ${RUN_URL}"

          curl --fail --silent --show-error \
            --request POST \
            --url "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data chat_id="${TELEGRAM_CHAT_ID}" \
            --data text="${MESSAGE}"
